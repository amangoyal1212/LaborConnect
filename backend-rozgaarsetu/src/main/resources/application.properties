# ---- Server ----
server.port=8080

# ---- MySQL Datasource ----
spring.datasource.url=jdbc:mysql://localhost:3306/rozgaarsetu_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
